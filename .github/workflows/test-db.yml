name: Test FreeDB Connection

# Запускать скрипт при пуше в ветку main или вручную (workflow_dispatch)
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test-database:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Test MySQL Connection
        # Подтягиваем наши секреты в переменные окружения
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: |
          # Устанавливаем MySQL клиент (если его вдруг нет на сервере GitHub)
          sudo apt-get update
          sudo apt-get install -y default-mysql-client
          
          # Пробуем подключиться и выполнить простейшую команду
          echo "Подключаемся к базе данных..."
          mysql -h $DB_HOST -u $DB_USER -p"$DB_PASSWORD" $DB_NAME -e "SHOW TABLES;"
          
          echo "Подключение успешно установлено!"
